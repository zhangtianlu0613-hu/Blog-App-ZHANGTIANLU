<body class="site-page list-page">
    <div class="page-orb page-orb--peach"></div>
    <div class="page-orb page-orb--cream"></div>

    <header class="site-header">
        <div class="site-header__inner">
            <button class="site-header__toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"
                data-nav-toggle>
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="site-nav" data-nav>
                <a href="blog_list.html">Home</a>
                <a href="blog_register.html">Blog Register</a>
                <a href="#">Profile</a>
                <a href="blog_delete_list.html">Delete List</a>
                <a th:href="@{/admin/logout}">Logout</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <section class="section-title">
            <p class="section-title__sub">Journal Showcase</p>
            <h1>Blog List</h1>
            <!-- <p class="section-title__welcome">
                Welcome,
                <span>Guest</span>
            </p> -->
            <div class="section-title__line"></div>
        </section>

        <section class="list-toolbar">
            <div class="list-toolbar__copy">
                <p>すべての記事を一箇所で閲覧できます。カードを開いて記事全文を読み、ディスカッションに参加しましょう。</p>
                <form class="search-form" action="/blog/list" method="get">
                    <label class="sr-only" for="keyword">タイトルでブログを検索</label>
                    <input id="keyword" type="search" name="keyword" value=""
                        placeholder="ブログタイトルで検索">
                    <button class="pill-button pill-button--warm" type="submit">検索</button>
                    <!-- <a class="search-form__reset" href="/blog/list">クリア</a> -->
                </form>
                <!-- <p class="search-summary">
                    検索結果を表示中。
                </p> -->
            </div>
            <!-- <a class="pill-button pill-button--coral" href="/blog/register">ブログを書く</a> -->
            <!-- <a class="pill-button pill-button--coral" href="/admin/login">ログインして書く</a> -->
        </section>

        <section class="blog-grid-section">
            <div class="list-decor" data-list-decor></div>

            <!-- <div class="blog-grid">
                <article class="blog-card">
                    <a class="blog-card__link" href="/blog/{blogId}">
                        <div class="blog-card__media blog-card__media--empty">
                            <span class="blog-card__badge">ブログ</span>
                            <img src="/blog-img/${blog.blogImage}" alt="${blog.blogTitle}">
                            <span class="blog-card__placeholder">ブログストーリー</span>
                        </div>

                        <div class="blog-card__body">
                            <p class="blog-card__date">2026/05/14</p>
                            <h2>ブログタイトル</h2>
                            <p class="blog-card__summary">
                                記事の短い要約がここに表示されます。
                            </p>
                        </div>
                    </a>
                </article>
            </div> -->

            <div class="empty-state">
                <h2>まだ記事がありません</h2>
                <p>最初の記事を作成すると、ここにカードとして表示されます。</p>
                <!-- <a class="pill-button pill-button--mint" href="/blog/register">最初のブログを作成</a> -->
                <!-- <a class="pill-button pill-button--mint" href="/admin/login">ログインして作成</a> -->
                <!-- <a class="pill-button pill-button--mint" href="/blog/list">すべての記事に戻る</a> -->
            </div>
        </section>
