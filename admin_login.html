<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | masaki blog</title>
</head>

<body class="auth-page auth-page--sky">
    <div class="auth-scene">
        <div class="auth-scene__glow auth-scene__glow--one"></div>
        <div class="auth-scene__glow auth-scene__glow--two"></div>
        <div class="auth-scene__particles" data-particle-theme="petal"></div>

        <main class="auth-card">
            <p class="auth-card__eyebrow">masaki blog</p>
            <h1 class="auth-card__title">Welcome</h1>

            <form class="auth-form" th:action="@{/admin/login/process}" method="post">
                <label class="auth-field" for="adminEmail">
                    <span class="sr-only">User Email</span>
                    <input id="adminEmail" type="email" name="adminEmail" placeholder="UserEmail"
                        autocomplete="email" required>
                </label>

                <label class="auth-field" for="password">
                    <span class="sr-only">Password</span>
                    <input id="password" type="password" name="password" placeholder="Password"
                        autocomplete="current-password" required>
                </label>

                <button class="auth-button" type="submit">Login</button>
            </form>

            <a class="auth-link" href="admin_register.html">新規登録はこちら</a>
        </main>
    </div>

</body>

</html>
